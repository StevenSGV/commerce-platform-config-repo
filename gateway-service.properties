spring.application.name=gateway-service
server.port=443
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=product-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/products/**

spring.cloud.gateway.server.webmvc.routes[1].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://inventory-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/inventories/**

spring.cloud.gateway.server.webmvc.routes[2].id=cart-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://cart-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/carts/**

spring.cloud.gateway.server.webmvc.routes[3].id=order-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/orders/**
